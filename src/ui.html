<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 12px;
    color: #1a1a1a;
    background: #fff;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #e5e5e5;
  }

  header h1 { font-size: 13px; font-weight: 600; }
  header span { font-size: 11px; color: #888; }

  .scan-btn {
    width: 100%;
    padding: 10px;
    background: #18a0fb;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-radius: 0;
  }
  .scan-btn:hover { background: #0d8de3; }

  #status {
    padding: 10px 16px;
    font-size: 11px;
    color: #888;
    min-height: 32px;
    display: flex;
    align-items: center;
  }

  #results { overflow-y: auto; max-height: 400px; }

  .summary {
    padding: 8px 16px;
    font-size: 11px;
    background: #f5f5f5;
    border-bottom: 1px solid #e5e5e5;
    color: #555;
  }
  .summary b { color: #1a1a1a; }

  .item {
    padding: 10px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.1s;
  }
  .item:hover { background: #f7f9ff; }

  .item-name {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-bottom: 2px;
  }

  .item-preview {
    font-size: 12px;
    color: #1a1a1a;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .issue {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-top: 4px;
  }

  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge.error   { background: #ffe0e0; color: #c0392b; }
  .badge.warning { background: #fff3cd; color: #856404; }

  .issue-msg { font-size: 11px; color: #444; line-height: 1.4; }

  .empty {
    padding: 32px 16px;
    text-align: center;
    color: #aaa;
    font-size: 12px;
  }

  .error-msg {
    padding: 10px 16px;
    color: #c0392b;
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>contrast-guard</h1>
  <span>WCAG 2.1 AA</span>
</header>

<button class="scan-btn" id="scanBtn">Scan selection</button>

<div id="status">Select a frame and click Scan.</div>
<div id="results"></div>

<script>
  const btn = document.getElementById('scanBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  btn.onclick = () => {
    status.textContent = 'Scanning...';
    results.innerHTML = '';
    parent.postMessage({ pluginMessage: { type: 'scan' } }, '*');
  };

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'error') {
      status.textContent = '';
      results.innerHTML = `<div class="error-msg">${msg.message}</div>`;
      return;
    }

    if (msg.type === 'results') {
      const items = msg.results;

      if (items.length === 0) {
        status.textContent = '';
        results.innerHTML = `<div class="empty">No issues found. Looks good!</div>`;
        return;
      }

      const errors   = items.reduce((n, i) => n + i.issues.filter(x => x.severity === 'error').length, 0);
      const warnings = items.reduce((n, i) => n + i.issues.filter(x => x.severity === 'warning').length, 0);

      status.textContent = '';
      results.innerHTML = `
        <div class="summary">
          Found issues in <b>${items.length}</b> text layer${items.length > 1 ? 's' : ''} —
          <b>${errors}</b> error${errors !== 1 ? 's' : ''},
          <b>${warnings}</b> warning${warnings !== 1 ? 's' : ''}
        </div>
        ${items.map(item => `
          <div class="item" data-id="${escHtml(item.id)}">
            <div class="item-name">${escHtml(item.name)}</div>
            <div class="item-preview">"${escHtml(item.preview)}"</div>
            ${item.issues.map(issue => `
              <div class="issue">
                <span class="badge ${issue.severity}">${issue.severity}</span>
                <span class="issue-msg">${escHtml(issue.message)}</span>
              </div>
            `).join('')}
          </div>
        `).join('')}
      `;
    }
  };

  document.getElementById('results').addEventListener('click', (e) => {
    const item = e.target.closest('.item');
    if (item && item.dataset.id) {
      parent.postMessage({ pluginMessage: { type: 'select', id: item.dataset.id } }, '*');
    }
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
